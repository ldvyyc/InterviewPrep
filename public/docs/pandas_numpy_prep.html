# 2. 两两欧式距离（广播技巧）
A = np.random.randn(100, 10)  # 100个10维向量
B = np.random.randn(80, 10)   # 80个10维向量

# 方法一：纯广播，内存占用大
# dist = np.sqrt(((A[:, np.newaxis, :] - B[np.newaxis, :, :])**2).sum(axis=2))

# 方法二：||a-b||² = ||a||² + ||b||² - 2·a@b.T（推荐）
sq_A = (A**2).sum(axis=1, keepdims=True)   # (100,1)
sq_B = (B**2).sum(axis=1, keepdims=True).T  # (1,80)
dist = np.sqrt(np.maximum(sq_A + sq_B - 2 * A @ B.T, 0))
print("距离矩阵 shape:", dist.shape)  # (100, 80)

# 方法一：einsum
C1 = np.einsum('bij,bjk->bik', A, B)
# 方法二：matmul（推荐，更快）
C2 = A @ B  # numpy>=1.16 支持批量
print("结果一致:", np.allclose(C1, C2))
print("输出 shape:", C1.shape)  # (32,4,5)

# 常用 einsum 模式
x = np.random.randn(10, 5)
print("行点积(Gram矩阵):", np.einsum('ik,jk->ij', x, x).shape)  # (10,10)
print("迹:", np.einsum('ii->', x.T @ x))  # 标量

# 2. 手工 PCA
np.random.seed(42)
X = np.random.randn(200, 10)
X[:, 0] = X[:, 1] * 2 + np.random.randn(200) * 0.1  # 构造相关性

# 标准化
X_c = X - X.mean(axis=0)

# 协方差矩阵（两种等价写法）
C = X_c.T @ X_c / (len(X) - 1)
# C = np.cov(X_c.T)  # 等价

# 特征分解（eigh专用于对称矩阵，更稳定）
eigenvalues, eigenvectors = np.linalg.eigh(C)
# eigh 返回升序，反转为降序
idx = np.argsort(eigenvalues)[::-1]
eigenvalues = eigenvalues[idx]
eigenvectors = eigenvectors[:, idx]

explained = eigenvalues / eigenvalues.sum()
print(f"前2主成分解释方差: {explained[:2].sum():.2%}")

Z = X_c @ eigenvectors[:, :2]  # 投影到2D
print("PCA结果 shape:", Z.shape)  # (200,2)

tol = 1e-10

M_pinv = Vt.T @ np.diag(s_inv) @ U.T
print("伪逆验证 M@M+@M≈M:", np.allclose(M @ M_pinv @ M, M))

# 1. View vs Copy 辨析

v1 = arr[1:3, :]        # 切片 → view

# 2. 零拷贝滑动窗口

import numpy as np

np.random.seed(0)
df = pd.DataFrame({
    'ret': np.random.randn(200) * 0.02,
    'vol': np.random.rand(200) * 0.05 + 0.01
})

# 1. where：保留正收益，负的置0
positive_only = df['ret'].where(df['ret'] > 0, other=0)
print("负值变0后最小值:", positive_only.min())  # 0.0

# 带 inplace 效果的写法
df2 = df.copy()
df2['ret'] = df2['ret'].where(df2['ret'] > 0, 0)

# 2. mask：超过3σ的极值变NaN
mean, std = df['ret'].mean(), df['ret'].std()
outlier_mask = (df['ret'] - mean).abs() > 3 * std
cleaned = df['ret'].mask(outlier_mask)
print(f"极值数量: {outlier_mask.sum()}, 处理后NaN: {cleaned.isna().sum()}")

# 3. clip：截断到[-5%, 5%]
clipped = df['ret'].clip(lower=-0.05, upper=0.05)
print(f"clip后: min={clipped.min():.4f}, max={clipped.max():.4f}")

# 按列不同阈值clip（高级用法）
lower_bounds = pd.Series({'ret': -0.03, 'vol': 0.0})
upper_bounds = pd.Series({'ret':  0.03, 'vol': 0.1})
df_clipped = df.clip(lower=lower_bounds, upper=upper_bounds, axis=1)

# 4. between：区间过滤

# 综合应用：Winsorize（缩尾处理）
def winsorize(series, q=0.01):
    lo, hi = series.quantile(q), series.quantile(1-q)
    return series.clip(lo, hi)

winsorized = winsorize(df['ret'])
print(f"缩尾后范围: [{winsorized.min():.5f}, {winsorized.max():.5f}]")`,

def group_stats(g):
    """返回一个 Series，索引即列名"""
    ret = g['ret'].dropna()
    return pd.Series({
        'sharpe':    ret.mean() / ret.std() * np.sqrt(252),
        'max_dd':    (ret.cumsum() - ret.cumsum().cummax()).min(),
        'win_rate':  (ret > 0).mean(),
        'n':         len(ret)
    })

def robust_parse(series):
    """处理多种日期格式混杂的 Series"""
    # 先尝试最常见格式（快速路径）
    formats = [
        '%Y-%m-%d', '%Y/%m/%d', '%d/%m/%Y',
        '%m/%d/%Y', '%d-%m-%Y', '%Y%m%d',
        '%Y-%m-%d %H:%M:%S', '%d/%m/%Y %H:%M',
    ]
    result = pd.Series([pd.NaT] * len(series), dtype='datetime64[ns]')
    remaining = series.copy()
    
    for fmt in formats:
        mask = result.isna() & remaining.notna()
        if not mask.any(): break
        parsed = pd.to_datetime(remaining[mask], format=fmt, errors='coerce')
        result[mask] = parsed
        remaining[mask & result.notna()] = None
    
    # 剩余无法识别的用 mixed 模式兜底
    still_na = result.isna() & series.notna()
    if still_na.any():
        result[still_na] = pd.to_datetime(series[still_na],
                                            format='mixed', errors='coerce')
    return result

us_holidays_2023 = pd.to_datetime([
    '2023-01-02',  # New Year observed
    '2023-01-16',  # MLK Day
    '2023-02-20',  # Presidents Day
    '2023-05-29',  # Memorial Day
    '2023-07-04',  # Independence Day
    '2023-09-04',  # Labor Day
    '2023-11-23',  # Thanksgiving
    '2023-12-25',  # Christmas
])
us_bd = pd.offsets.CustomBusinessDay(holidays=us_holidays_2023)
trading_days = pd.date_range('2023-01-01', '2023-12-31', freq=us_bd)
print(f"\\n2023年美国交易日数: {len(trading_days)} 天")

# 验证：元旦后第一个交易日
first_trade = trading_days[0]
print(f"2023年第一个交易日: {first_trade.date()}")  # 应为 1月3日

# np.busday_count 配合自定义节假日
holidays_arr = us_holidays_2023.values.astype('datetime64[D]')
n_bdays = np.busday_count('2023-01-01', '2023-12-31',
                            holidays=holidays_arr)
print(f"美国市场交易日（busday_count）: {n_bdays} 天")`,
      note: "面试Tip: reindex(method='ffill') 是将低频数据广播到高频的标准做法。构建特征时 shift(1) 是防数据泄露的关键操作——所有特征必须用过去的数据。CustomBusinessDay 适合简单需求，复杂的交易日历推荐用 pandas_market_calendars 库。"
    },
  ],
};

// ===================== UI Components =====================

function Tag({ text, color }) {
  return (
    <span style={{
      background: color + '20', color, border: `1px solid ${color}40`,
      borderRadius: 4, padding: '2px 9px',
      fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
      fontWeight: 700, letterSpacing: 1, whiteSpace: 'nowrap'
    }}>{text}</span>
  );
}

function KeyBadge({ text }) {
  return (
    <span style={{
      background: '#0f1c2e', color: '#7dd3fc',
      border: '1px solid #1e3a5f', borderRadius: 3,
      padding: '1px 7px', fontSize: 11,
      fontFamily: "'JetBrains Mono', monospace", whiteSpace: 'nowrap'
    }}>{text}</span>
  );
}

function CodeBlock({ code }) {
  const [copied, setCopied] = useState(false);
  return (
    <div style={{ position: 'relative', marginTop: 10 }}>
      <button onClick={() => {
        navigator.clipboard.writeText(code);
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      }} style={{
        position: 'absolute', top: 10, right: 10, zIndex: 2,
        background: copied ? '#16543a' : '#0f1c2e',
        color: copied ? '#4ade80' : '#4d6a8a',
        border: `1px solid ${copied ? '#4ade8040' : '#1e3a5f'}`,
        borderRadius: 4, padding: '2px 12px',
        fontSize: 11, cursor: 'pointer', fontFamily: "'JetBrains Mono', monospace"
      }}>{copied ? '✓ copied' : 'copy'}</button>
      <pre style={{
        background: '#020810', border: '1px solid #0f1c2e',
        borderRadius: 8, padding: '14px 16px', overflowX: 'auto',
        fontSize: 12, lineHeight: 1.75, color: '#b8cfe8',
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace", margin: 0
      }}>{code}</pre>
    </div>
  );
}

function TopicCard({ topic }) {
  const [open, setOpen] = useState(false);
  const [tab, setTab] = useState('problem');
  const tabs = [
    { id: 'problem', label: '📋 题目' },
    { id: 'theory',  label: '📐 理论' },
    { id: 'code',    label: '💻 代码' },
  ];
  return (
    <div style={{
      background: '#07111d', border: `1px solid ${open ? '#1e3a5f' : '#0f1c2e'}`,
      borderRadius: 10, marginBottom: 10, overflow: 'hidden',
      transition: 'border-color 0.2s, box-shadow 0.2s',
      boxShadow: open ? '0 0 0 1px #1e3a5f20' : 'none'
    }}>
      <div onClick={() => setOpen(!open)} style={{
        padding: '13px 18px', cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 12
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
          <Tag text={topic.tag} color={topic.tagColor} />
          <span style={{ color: '#c8ddf5', fontWeight: 600, fontSize: 14 }}>{topic.title}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
            {topic.keys.slice(0,3).map(k => <KeyBadge key={k} text={k} />)}
          </div>
          <span style={{ color: '#4d6a8a', fontSize: 16, marginLeft: 4 }}>{open ? '▲' : '▼'}</span>
        </div>
      </div>
      {open && (
        <div style={{ borderTop: '1px solid #0f1c2e' }} className="fade-in">
          <div style={{ display: 'flex', borderBottom: '1px solid #0f1c2e' }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                padding: '9px 18px', background: tab === t.id ? '#0c1a2b' : 'transparent',
                color: tab === t.id ? '#60a5fa' : '#4d6a8a',
                border: 'none', borderBottom: tab === t.id ? '2px solid #60a5fa' : '2px solid transparent',
                cursor: 'pointer', fontSize: 12, fontWeight: 600, letterSpacing: 0.5
              }}>{t.label}</button>
            ))}
          </div>
          <div style={{ padding: '18px 20px' }}>
            {tab === 'problem' && (
              <pre style={{
                color: '#94b8d9', fontSize: 13, lineHeight: 1.9,
                whiteSpace: 'pre-wrap', margin: 0, fontFamily: "'Syne', sans-serif"
              }}>{topic.problem}</pre>
            )}
            {tab === 'theory' && (
              <pre style={{
                color: '#7dd3fc', fontSize: 12.5, lineHeight: 1.9,
                whiteSpace: 'pre-wrap', margin: 0, background: '#020810',
                padding: 16, borderRadius: 8, border: '1px solid #0f1c2e',
                fontFamily: "'JetBrains Mono', monospace"
              }}>{topic.theory}</pre>
            )}
            {tab === 'code' && <CodeBlock code={topic.code} />}
            <div style={{
              marginTop: 14, background: '#0c1a0c',
              border: '1px solid #1a3a1a', borderLeft: '3px solid #4ade80',
              borderRadius: 6, padding: '10px 14px'
            }}>
              <span style={{ color: '#86efac', fontSize: 11, fontWeight: 700 }}>💡 </span>
              <span style={{ color: '#94b8a0', fontSize: 12, lineHeight: 1.7 }}>{topic.note}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [activeCat, setActiveCat] = useState('numpy');
  const cat = CATS.find(c => c.id === activeCat);
  const topics = TOPICS[activeCat] || [];
  const totalTopics = Object.values(TOPICS).flat().length;

  return (
    <div style={{ minHeight: '100vh', background: '#05080f' }}>
      {/* Header */}
      <div style={{
        background: 'linear-gradient(180deg, #070d1a 0%, #05080f 100%)',
        borderBottom: '1px solid #0f1c2e', padding: '20px 28px 0'
      }}>
        <div style={{ maxWidth: 980, margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }}>
            <div style={{
              width: 42, height: 42, borderRadius: 10, flexShrink: 0,
              background: 'linear-gradient(135deg, #f97316, #fb923c)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: "'JetBrains Mono', monospace", fontWeight: 900, fontSize: 18, color: '#05080f'
            }}>df</div>
            <div>
              <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: -0.3, color: '#e2eefa' }}>
                Pandas & NumPy · 数据处理面试备考
              </div>
              <div style={{ fontSize: 11.5, color: '#2e4a6a', marginTop: 2, fontFamily: "'JetBrains Mono', monospace" }}>
                {CATS.length} 模块 · {totalTopics} 道题 · 含高频 + 进阶指令
              </div>
            </div>
          </div>
          {/* Tab nav */}
          <div style={{ display: 'flex', gap: 2, overflowX: 'auto', paddingBottom: 0 }}>
            {CATS.map(c => (
              <button key={c.id} onClick={() => setActiveCat(c.id)} style={{
                padding: '9px 14px', background: 'transparent', border: 'none',
                borderBottom: activeCat === c.id ? `2px solid ${c.color}` : '2px solid transparent',
                color: activeCat === c.id ? c.color : '#2e4a6a',
                cursor: 'pointer', fontSize: 12, fontWeight: 700,
                whiteSpace: 'nowrap', transition: 'color 0.15s',
                fontFamily: "'JetBrains Mono', monospace"
              }}>
                <span style={{
                  background: activeCat === c.id ? c.color + '25' : 'transparent',
                  border: activeCat === c.id ? `1px solid ${c.color}40` : '1px solid transparent',
                  borderRadius: 3, padding: '1px 6px', marginRight: 6,
                  fontSize: 10
                }}>{c.short}</span>
                {c.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 980, margin: '0 auto', padding: '24px 28px' }}>
        {/* Section header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }}>
          <div style={{
            width: 46, height: 46, borderRadius: 10,
            background: cat.color + '18', border: `1px solid ${cat.color}35`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
            fontWeight: 900, color: cat.color
          }}>{cat.short}</div>
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, color: '#dde4f0' }}>{cat.label}</div>
            <div style={{ fontSize: 11.5, color: '#2e4a6a', marginTop: 1, fontFamily: "'JetBrains Mono', monospace" }}>
              {cat.desc} · {topics.length} 题
            </div>
          </div>
        </div>

        {topics.map((t, i) => <TopicCard key={i} topic={t} />)}

        {/* Cheatsheet footer */}
        <div style={{
          marginTop: 28, background: '#07111d',
          border: '1px solid #0f1c2e', borderRadius: 12, padding: 22
        }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: '#f97316', marginBottom: 16, letterSpacing: 1 }}>
            ⚡ 快速参考 — 高频指令速查
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 8 }}>
            {[
              ["df.loc[行标签, 列标签]",     "标签索引（含端点）"],
              ["df.iloc[行位置, 列位置]",     "位置索引（不含端点）"],
              ["df.query('a>0 and b<1')",     "字符串条件过滤"],
              ["df.assign(c=lambda d: ...)",  "不可变地添加新列"],
              ["df.pipe(func, **kwargs)",      "方法链调用"],
              ["df.melt(id_vars, value_vars)", "宽→长格式"],
              ["df.pivot(index,columns,val)", "长→宽格式"],
              ["df.stack() / .unstack()",     "MultiIndex级别折叠/展开"],
              ["df.groupby().transform(f)",   "组内操作，保持行数"],
              ["df.merge_asof(left, right)",  "时序近似匹配合并"],
              ["s.resample('ME').agg(...)",    "时序重采样"],
              ["s.shift(n) n>0滞后 n<0超前",  "时序位移（注意泄露）"],
              ["s.rolling(w).mean()",          "滑动窗口统计"],
              ["s.ewm(span=26).mean()",        "指数加权移动平均"],
              ["df.where(cond) / .mask(cond)", "条件替换（互为反操作）"],
              ["pd.cut / pd.qcut",             "等宽/等频分箱"],
              ["s.str.extract(r'pattern')",    "正则提取捕获组"],
              ["df.astype('category')",        "低基数列节省内存"],
              ["np.where(cond, x, y)",         "向量化三目运算"],
              ["np.einsum('ij,jk->ik', A, B)", "Einstein求和"],
              ["pd.to_datetime(s, format=...)", "字符串→datetime（指定格式最快）"],
              ["s.dt.strftime('%Y-%m-%d')",    "datetime→格式化字符串（向量化）"],
              ["pd.Timedelta(days=5, hours=3)","固定时间差对象"],
              ["pd.DateOffset(months=1)",      "日历感知偏移（处理月末）"],
              ["s.dt.floor('5min')",           "时间截断到5分钟（K线归组）"],
              ["s.dt.tz_localize('UTC')",      "给naive datetime加时区"],
              ["s.dt.tz_convert('US/Eastern')","aware datetime时区转换"],
              ["s.resample('ME').agg(dict)",   "OHLCV K线合成（注意复利ret）"],
              ["s.dt.to_period('M')",          "转为Period（月度统计）"],
              ["s.reindex(idx, method='ffill')","扩展索引+前向填充"],
              ["np.busday_count(start,end)",   "计算工作日数（支持自定义节假日）"],
            ].map(([cmd, desc], i) => (
              <div key={i} style={{
                display: 'flex', gap: 10, alignItems: 'flex-start',

                border: '1px solid #0f1c2e'
              }}>
                <code style={{
                  color: '#60a5fa', fontSize: 11,
                  fontFamily: "'JetBrains Mono', monospace", flexShrink: 0,

                <span style={{ color: '#2e4a6a', fontSize: 11, lineHeight: 1.5 }}>→ {desc}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
