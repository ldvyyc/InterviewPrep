def simulate_random_walk(n_steps: int, n_paths: int = 1000, seed: int = 42):
    """模拟对称随机游走"""
    rng = np.random.default_rng(seed)

def sharpe_ratio(returns: np.ndarray, annualize: bool = True) -> float:
    """计算Sharpe Ratio"""
    sr = returns.mean() / returns.std(ddof=1)
    return sr * np.sqrt(252) if annualize else sr

def bootstrap_ci(returns: np.ndarray, 
                 stat_fn, 
                 n_bootstrap: int = 10000, 
                 alpha: float = 0.05,
                 seed: int = 42) -> tuple:
    """Bootstrap置信区间（通用）"""
    rng = np.random.default_rng(seed)
    n = len(returns)
    
    boot_stats = np.array([
        stat_fn(rng.choice(returns, size=n, replace=True))
        for _ in range(n_bootstrap)
    ])
    
    lower = np.percentile(boot_stats, 100 * alpha / 2)
    upper = np.percentile(boot_stats, 100 * (1 - alpha / 2))
    return lower, upper, boot_stats

          code: `import numpy as np

def bonferroni_correction(p_values: np.ndarray, alpha: float = 0.05):
    """Bonferroni校正"""
    m = len(p_values)
    adjusted = np.minimum(p_values * m, 1.0)
    reject = adjusted < alpha
    return reject, adjusted

def bh_correction(p_values: np.ndarray, alpha: float = 0.05):
    """Benjamini-Hochberg FDR校正"""
    m = len(p_values)
    order = np.argsort(p_values)
    sorted_p = p_values[order]
    
    # BH threshold: p_(k) <= k/m * alpha
    thresholds = (np.arange(1, m+1) / m) * alpha
    below = sorted_p <= thresholds
    
    if not np.any(below):
        reject_sorted = np.zeros(m, dtype=bool)
    else:
        max_k = np.max(np.where(below)[0])
        reject_sorted = np.arange(m) <= max_k
    
    reject = np.zeros(m, dtype=bool)
    reject[order] = reject_sorted
    
    adj_p = np.zeros(m)
    adj_p[order] = np.minimum.accumulate(
        (m / np.arange(1, m+1)) * sorted_p[::-1]
    )[::-1]
    adj_p = np.minimum(adj_p, 1.0)
    
    return reject, adj_p

import pandas as pd

def ewma_volatility(returns: np.ndarray, lam: float = 0.94) -> np.ndarray:
    """EWMA波动率（RiskMetrics方法）"""
    var = np.zeros(len(returns))
    var[0] = returns[0] ** 2
    for t in range(1, len(returns)):
        var[t] = lam * var[t-1] + (1 - lam) * returns[t]**2
    return np.sqrt(var)

def rolling_sharpe(returns: np.ndarray, 
                   window: int = 63,
                   annualize: float = 252) -> np.ndarray:
    """滚动Sharpe Ratio"""
    n = len(returns)
    sharpe = np.full(n, np.nan)
    for i in range(window, n):
        r = returns[i-window:i]
        mu = r.mean()
        sigma = r.std(ddof=1)
        if sigma > 1e-10:
            sharpe[i] = mu / sigma * np.sqrt(annualize)
    return sharpe

def rolling_beta(asset_ret: np.ndarray, 
                 bench_ret: np.ndarray, 
                 window: int = 63) -> np.ndarray:
    """滚动Beta"""
    n = len(asset_ret)
    beta = np.full(n, np.nan)
    for i in range(window, n):
        a = asset_ret[i-window:i]
        b = bench_ret[i-window:i]
        cov_matrix = np.cov(a, b, ddof=1)
        beta[i] = cov_matrix[0, 1] / cov_matrix[1, 1]
    return beta

from scipy import stats

def adf_test_manual(series: np.ndarray, lags: int = 1) -> dict:
    """简化ADF检验（面试够用版）"""
    y = np.diff(series)
    x_lagged = series[:-1]
    
    n = len(y) - lags
    Y = y[lags:]
    X = np.column_stack([
        x_lagged[lags:],
        *[y[lags-i:-i] for i in range(1, lags+1)],
        np.ones(n)
    ])
    
    beta = np.linalg.lstsq(X, Y, rcond=None)[0]
    resid = Y - X @ beta
    se = np.sqrt(np.sum(resid**2) / (n - X.shape[1]) * 
                 np.linalg.inv(X.T @ X)[0, 0])
    t_stat = beta[0] / se
    
    return {"t_statistic": t_stat, 
            "critical_5pct": -2.86,
            "is_stationary": t_stat < -2.86}

def pairs_trading_signal(price1, price2, window=60, entry_z=2.0, exit_z=0.5):
    """配对交易信号生成"""
    log1, log2 = np.log(price1), np.log(price2)
    
    beta = np.polyfit(log2, log1, 1)[0]
    spread = log1 - beta * log2
    
    n = len(spread)
    zscore = np.full(n, np.nan)
    for i in range(window, n):
        s = spread[i-window:i]
        zscore[i] = (spread[i] - s.mean()) / (s.std() + 1e-10)
    
    signal = np.zeros(n)
    signal[zscore > entry_z] = -1
    signal[zscore < -entry_z] = 1
    signal[np.abs(zscore) < exit_z] = 0
    
    adf = adf_test_manual(spread)
    print(f"Hedge ratio β : {beta:.4f}")
    print(f"ADF t-stat    : {adf['t_statistic']:.4f}")
    print(f"协整关系      : {'✓ 通过(5%)' if adf['is_stationary'] else '❌ 不通过'}")
    print(f"做多信号次数  : {(signal==1).sum()}")
    print(f"做空信号次数  : {(signal==-1).sum()}")
    
    return signal, spread, zscore

# ======= 截面排名（向量化）=======

# ======= 构建多空组合 =======
def long_short_portfolio(factor_df, ret_df, q=0.2):
    """多空组合收益: 做多top q，做空bottom q"""
    long_mask = factor_df.rank(axis=1, pct=True) > (1 - q)
    short_mask = factor_df.rank(axis=1, pct=True) < q
    long_ret = ret_df[long_mask].mean(axis=1)
    short_ret = ret_df[short_mask].mean(axis=1)
    return (long_ret - short_ret).rename('LS_Portfolio')

# ======= IC计算 =======
def compute_ic(factor_df, ret_df):
    ic_series = {}
    for date in factor_df.index:
        f = factor_df.loc[date].dropna()
        r = ret_df.loc[date].reindex(f.index).dropna()
        common = f.index.intersection(r.index)
        if len(common) > 10:
            ic, _ = spearmanr(f[common], r[common])
            ic_series[date] = ic
    return pd.Series(ic_series, name='IC')

ls_ret = long_short_portfolio(factor, future_ret)

function DiffBadge({ text, color }) {
  return (
    <span style={{
      background: color + "22", color: color,
      border: `1px solid ${color}44`,
      borderRadius: "4px", padding: "2px 8px",
      fontSize: "11px", fontFamily: "monospace",
      fontWeight: "700", letterSpacing: "0.5px"
    }}>{text}</span>
  );
}

function CodeBlock({ code }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(code);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <div style={{ position: "relative", marginTop: "8px" }}>
      <button onClick={copy} style={{
        position: "absolute", top: "10px", right: "10px",
        background: copied ? "#00d4aa22" : "#ffffff11",
        color: copied ? "#00d4aa" : "#888",
        border: "1px solid #ffffff22",
        borderRadius: "4px", padding: "3px 10px",
        fontSize: "11px", cursor: "pointer", zIndex: 1
      }}>{copied ? "✓ Copied" : "Copy"}</button>
      <pre style={{
        background: "#0a0e1a", border: "1px solid #1e2a3a",
        borderRadius: "8px", padding: "16px",
        overflowX: "auto", fontSize: "12px", lineHeight: "1.7",
        color: "#c9d1d9", fontFamily: "'JetBrains Mono', 'Fira Code', monospace", margin: 0
      }}><code>{code}</code></pre>
    </div>
  );
}

function TopicCard({ topic }) {
  const [expanded, setExpanded] = useState(false);
  const [tab, setTab] = useState("problem");

  return (
    <div style={{
      background: "#0d1117", border: "1px solid #1e2a3a",
      borderRadius: "10px", marginBottom: "12px", overflow: "hidden"
    }}>
      <div onClick={() => setExpanded(!expanded)} style={{
        padding: "16px 20px", cursor: "pointer",
        display: "flex", justifyContent: "space-between", alignItems: "center"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
          <DiffBadge text={topic.difficulty} color={topic.diffColor} />
          <span style={{ color: "#e6edf3", fontWeight: "600", fontSize: "14px" }}>
            {topic.title}
          </span>
        </div>
        <span style={{ color: "#4d9fff", fontSize: "18px" }}>{expanded ? "−" : "+"}</span>
      </div>

      {expanded && (
        <div style={{ borderTop: "1px solid #1e2a3a" }}>
          <div style={{ display: "flex", borderBottom: "1px solid #1e2a3a" }}>
            {["problem", "theory", "code"].map(t => (
              <button key={t} onClick={() => setTab(t)} style={{
                padding: "10px 20px",
                background: tab === t ? "#161b22" : "transparent",
                color: tab === t ? "#4d9fff" : "#666",
                border: "none",
                borderBottom: tab === t ? "2px solid #4d9fff" : "2px solid transparent",
                cursor: "pointer", fontSize: "12px", fontWeight: "600",
                textTransform: "uppercase", letterSpacing: "1px"
              }}>{t === "problem" ? "题目" : t === "theory" ? "理论" : "代码"}</button>
            ))}
          </div>
          <div style={{ padding: "20px" }}>
            {tab === "problem" && (
              <pre style={{
                color: "#c9d1d9", fontSize: "13px", lineHeight: "1.8",
                whiteSpace: "pre-wrap", margin: 0, fontFamily: "inherit"
              }}>{topic.problem}</pre>
            )}
            {tab === "theory" && (
              <pre style={{
                color: "#79c0ff", fontSize: "13px", lineHeight: "1.8",
                whiteSpace: "pre-wrap", margin: 0, background: "#0a0e1a",
                padding: "16px", borderRadius: "8px", border: "1px solid #1e2a3a",
                fontFamily: "'JetBrains Mono', monospace"
              }}>{topic.theory}</pre>
            )}
            {tab === "code" && <CodeBlock code={topic.code} />}
            <div style={{
              marginTop: "16px", background: "#161b22",
              border: "1px solid #ffaa0033", borderLeft: "3px solid #ffaa00",
              borderRadius: "6px", padding: "12px 16px"
            }}>
              <span style={{ color: "#ffaa00", fontSize: "11px", fontWeight: "700" }}>💡 </span>
              <span style={{ color: "#ccc", fontSize: "12px" }}>{topic.note}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [activeSection, setActiveSection] = useState("stats");
  const section = data.sections.find(s => s.id === activeSection);

  return (
    <div style={{ minHeight: "100vh", background: "#010409" }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #0d1117 0%, #161b22 100%)",
        borderBottom: "1px solid #1e2a3a", padding: "24px 32px"
      }}>
        <div style={{ maxWidth: "900px", margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
            <div style={{
              width: "36px", height: "36px",
              background: "linear-gradient(135deg, #00d4aa, #4d9fff)",
              borderRadius: "8px", display: "flex", alignItems: "center",
              justifyContent: "center", fontSize: "18px", fontWeight: "900", color: "#010409"
            }}>Q</div>
            <div>
              <div style={{ fontSize: "18px", fontWeight: "700", letterSpacing: "-0.3px" }}>
                Quant Researcher · Live Coding Prep
              </div>
              <div style={{ fontSize: "12px", color: "#555", marginTop: "2px" }}>
                HF面试 · Python · 统计/概率 + 时间序列
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Nav */}
      <div style={{ background: "#0d1117", borderBottom: "1px solid #1e2a3a", padding: "0 32px" }}>
        <div style={{ maxWidth: "900px", margin: "0 auto", display: "flex", gap: "4px" }}>
          {data.sections.map(s => (
            <button key={s.id} onClick={() => setActiveSection(s.id)} style={{
              padding: "14px 20px", background: "transparent", border: "none",
              borderBottom: activeSection === s.id ? `2px solid ${s.color}` : "2px solid transparent",
              color: activeSection === s.id ? s.color : "#555",
              cursor: "pointer", fontSize: "13px", fontWeight: "600",
              display: "flex", alignItems: "center", gap: "8px"
            }}>
              <span style={{ fontSize: "16px" }}>{s.icon}</span>
              <div style={{ textAlign: "left" }}>

                <div style={{ fontSize: "10px", opacity: 0.7, fontWeight: "400" }}>{s.subtitle}</div>
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: "900px", margin: "0 auto", padding: "32px" }}>
        <div style={{ marginBottom: "24px", display: "flex", alignItems: "center", gap: "12px" }}>
          <span style={{
            fontSize: "24px", width: "44px", height: "44px",
            background: section.color + "22", border: `1px solid ${section.color}44`,
            borderRadius: "10px", display: "flex", alignItems: "center",
            justifyContent: "center", color: section.color
          }}>{section.icon}</span>
          <div>
            <div style={{ fontSize: "20px", fontWeight: "700" }}>{section.title}</div>
            <div style={{ fontSize: "12px", color: "#555" }}>{section.topics.length} 道高频题</div>
          </div>
        </div>

        {section.topics.map((topic, i) => (
          <TopicCard key={i} topic={topic} />
        ))}

        {/* Tips */}
        <div style={{
          marginTop: "32px", background: "#0d1117",
          border: "1px solid #1e2a3a", borderRadius: "12px", padding: "24px"
        }}>
          <div style={{ fontSize: "13px", fontWeight: "700", color: "#4d9fff", marginBottom: "16px" }}>
            🎯 HF Live Coding 通用策略
          </div>
          {[
            ["先讲思路", "写代码前用30秒说清楚算法思路，面试官在评估你的思维过程，不只是代码"],
            ["边写边说", "解释每个关键步骤：'这里我用EWMA而不是简单移动平均，因为...'"],
            ["主动测试", "写完主动说'让我验证一下边界情况'，体现工程严谨性"],
            ["性能意识", "主动提出向量化优化，提及C++加速关键路径，展示你的C++背景价值"],
            ["金融直觉", "将数学结果连接到金融直觉：'这个结果说明该因子在市场...时失效'"],
          ].map(([k, v], i) => (
            <div key={i} style={{
              display: "flex", gap: "12px", marginBottom: "10px",
              padding: "10px", background: "#161b22", borderRadius: "6px"
            }}>
              <span style={{ color: "#00d4aa", fontWeight: "700", fontSize: "12px", minWidth: "60px" }}>{k}</span>
              <span style={{ color: "#8b949e", fontSize: "12px", lineHeight: "1.6" }}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
